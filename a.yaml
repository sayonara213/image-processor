services:
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: redis
    volumes:
      - redis_data:/data
  loki:
    image: grafana/loki:2.9.0
    container_name: loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - loki
  api:
    image: 794038232812.dkr.ecr.ap-northeast-1.amazonaws.com/image-processor-api:latest
    container_name: api
    ports:
      - "3000:3000"
    env_file:
      - ./app/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - LOKI_HOST=http://loki:3100
    command: node dist/main.js
    depends_on:
      - db
      - redis
  worker:
    image: 794038232812.dkr.ecr.ap-northeast-1.amazonaws.com/image-processor-worker:latest
    container_name: worker
    env_file:
      - ./app/.env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_HOST=redis
      - LOKI_HOST=http://loki:3100
    command: node dist/worker/main.js
    depends_on:
      - db
      - redis

volumes:
  pg_data:
  redis_data:
  minio_data:
  grafana_data:
